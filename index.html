<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPÉRIO DIGITAL | Brando01Digital</title>
    
    <link rel="icon" href="imperioicon.ico" type="image/x-icon">
    
    <style>
        :root {
            --primary: #00ff88;
            --bg: #050505;
            --border: rgba(0, 255, 136, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% -20%, #004d2c 0%, #050505 50%);
            color: white;
        }

        nav {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--primary);
        }

        .hero {
            padding: 80px 5%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            color: #ccc;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .btn {
            background: var(--primary);
            color: black;
            padding: 20px 50px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        .box {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }

    </style>
</head>

<body>

<nav>
    <div class="logo">IMPÉRIO DIGITAL</div>
</nav>

<section class="hero">
    <h1>Entre no Império Digital</h1>
    <p>Aprenda a ganhar dinheiro online com estratégias reais.</p>

    <button class="btn" onclick="abrirPagamento()">Quero entrar</button>

    <div class="box" id="pagamentoBox">
        <h2>Pagamento via Pix</h2>
        <p><strong>Valor:</strong> R$ 19,90</p>
        <p><strong>Chave Pix:</strong> SEUEMAIL@GMAIL.COM</p>

        <p style="color:#aaa;">⚠️ Envie o comprovante corretamente. Liberação em até 1 hora.</p>

        <input type="text" id="nome" placeholder="Seu nome"><br>
        <input type="text" id="comprovante" placeholder="Link do comprovante"><br>

        <button class="btn" onclick="enviarPagamento()">Já paguei</button>
    </div>
</section>

<script>
function abrirPagamento() {
    document.getElementById("pagamentoBox").style.display = "block";
}

function enviarPagamento() {
    const nome = document.getElementById("nome").value;
    const comprovante = document.getElementById("comprovante").value;

    if (!nome || !comprovante) {
        alert("Preencha tudo!");
        return;
    }

    fetch("https://discord.com/api/webhooks/1494389661135536149/-MtbRptFqiSrfh9m3NR41taKwbhPzwTA_QMbawVsdKENKIzQZkLbQhDnjUpWVV6YKJLR", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            content: `💰 NOVO PAGAMENTO\n\n👤 Nome: ${nome}\n📎 Comprovante: ${comprovante}`
        })
    });

    alert("Pagamento enviado! Aguarde aprovação.");

    document.getElementById("nome").value = "";
    document.getElementById("comprovante").value = "";
}
</script>

</body>
</html>
