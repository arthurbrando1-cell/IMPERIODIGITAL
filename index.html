<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPÉRIO DIGITAL | OFICIAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc6d;
            --bg: #0a0a0a;
            --surface: #111;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #00ff8815 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .hero {
            padding: 100px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            line-height: 1.1;
            margin-bottom: 25px;
            background: linear-gradient(to bottom, #fff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #888;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            background: var(--primary);
            color: #000;
            padding: 22px 45px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .box {
            display: none;
            margin-top: 50px;
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .box h2 {
            margin-bottom: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        .pix-info {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 25px;
            text-align: left;
        }

        .pix-info span {
            display: block;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 5px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .success-area {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border: 1px dashed var(--primary);
            background: rgba(0, 255, 136, 0.05);
        }

        .dc-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">IMPÉRIO DIGITAL</div>
</nav>

<section class="hero">
    <h1>DOMINE O MERCADO DIGITAL</h1>
    <p>Acesso exclusivo à metodologia de escala e estratégias de alto rendimento.</p>

    <button class="btn" id="mainBtn" onclick="abrirPagamento()">Adquirir Acesso</button>

    <div class="box" id="pagamentoBox">
        <h2>Checkout de Acesso</h2>
        
        <div class="pix-info">
            <p>Valor único: <strong>R$ 19,90</strong></p>
            <p>Chave Pix E-mail: <span id="chave">SEUEMAIL@GMAIL.COM</span></p>
        </div>

        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="comprovante" placeholder="URL do Comprovante ou ID da Transação">

        <button class="btn" style="width: 100%;" onclick="enviarPagamento()">Confirmar Envio</button>

        <div id="successArea" class="success-area">
            <p style="color: var(--primary); margin-bottom: 10px;">Solicitação enviada com sucesso.</p>
            <p>Seu link de acesso provisório:</p>
            <a href="https://discord.gg/V47vewa6ds" class="dc-link" target="_blank">ENTRAR NO DISCORD</a>
        </div>
    </div>
</section>

<script>
function abrirPagamento() {
    document.getElementById("pagamentoBox").style.display = "block";
    document.getElementById("mainBtn").style.display = "none";
}

async function enviarPagamento() {
    const nome = document.getElementById("nome").value;
    const comprovante = document.getElementById("comprovante").value;
    const webhookURL = "https://discord.com/api/webhooks/1494389661135536149/-MtbRptFqiSrfh9m3NR41taKwbhPzwTA_QMbawVsdKENKIzQZkLbQhDnjUpWVV6YKJLR";

    if (!nome || !comprovante) {
        alert("Preencha todos os campos para validação.");
        return;
    }

    // Payload profissional
    const payload = {
        embeds: [{
            title: "NOVO PAGAMENTO IDENTIFICADO",
            color: 65280,
            fields: [
                { name: "Cliente", value: nome, inline: true },
                { name: "Comprovante", value: comprovante, inline: true }
            ],
            footer: { text: "Sistema Império Digital" },
            timestamp: new Date()
        }]
    };

    try {
        await fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        // Libera o link na tela para o usuário
        document.getElementById("successArea").style.display = "block";
        alert("Dados enviados! O acesso ao grupo está liberado abaixo.");
        
    } catch (error) {
        alert("Erro ao enviar. Tente novamente.");
    }
}
</script>

</body>
</html>
